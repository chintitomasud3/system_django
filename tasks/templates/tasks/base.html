<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow // Premium Task Manager</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            950: '#030712',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                            500: '#64748b',
                        },
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js (deferred) -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar for columns */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(51, 65, 85, 0.8);
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col antialiased">

    <!-- Header Navigation -->
    <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <i class="fa-solid fa-cubes text-white text-lg"></i>
                    </div>
                    <span class="font-outfit font-bold text-xl tracking-tight bg-gradient-to-r from-white via-slate-200 to-indigo-400 bg-clip-text text-transparent">
                        TaskFlow
                    </span>
                    <span class="px-2 py-0.5 text-[10px] font-semibold bg-indigo-500/10 text-indigo-400 rounded-full border border-indigo-500/20">
                        CRUD Live
                    </span>
                </div>

                <!-- Right Navigation / Meta info -->
                <div class="flex items-center gap-4">
                    <div class="text-xs text-slate-400 hidden sm:block">
                        <span class="inline-block h-2 w-2 rounded-full bg-emerald-500 animate-pulse mr-2"></span>
                        Backend: Django + SQLite
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-900 bg-slate-950/40 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-slate-500">
            TaskFlow CRUD App powered by Tailwind CSS, HTMX, Alpine.js, & Django.
        </div>
    </footer>

    <!-- Interactive Global Modal Container (Alpine.js controlled) -->
    <div id="modal-container" 
         x-data="{ isOpen: false }" 
         @open-modal.window="isOpen = true" 
         @close-modal.window="isOpen = false"
         @task-list-changed.window="isOpen = false"
         x-show="isOpen" 
         class="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4"
         style="display: none;" 
         x-cloak>
        
        <!-- Backdrop Backdrop with Blur -->
        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm transition-opacity" 
             x-show="isOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click="isOpen = false"></div>

        <!-- Modal Dialog Box -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl transform transition-all relative z-10"
             x-show="isOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             @click.stop>
            
            <div id="modal-content">
                <!-- HTMX will load the content form inside this container -->
                <div class="p-8 text-center text-slate-400">
                    <i class="fa-solid fa-circle-notch animate-spin text-2xl text-indigo-500 mr-2"></i> Loading form...
                </div>
            </div>
        </div>
    </div>

    <!-- Interactive Toast Notification System (Alpine.js) -->
    <div x-data="{ toasts: [] }" 
         @show-toast.window="toasts.push({ id: Date.now(), message: $event.detail.value || $event.detail, type: 'success' });"
         class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
        
        <template x-for="toast in toasts" :key="toast.id">
            <div x-data="{ 
                     show: false,
                     init() { 
                         this.$nextTick(() => this.show = true);
                         setTimeout(() => { this.show = false; setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== this.toast.id) }, 300) }, 3500);
                     } 
                 }" 
                 x-show="show" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4 scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                 x-transition:leave="transition ease-in duration-300"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 translate-y-2 scale-95"
                 class="bg-slate-900 border border-slate-800 text-slate-100 px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-3 min-w-[320px] pointer-events-auto border-l-4 border-l-indigo-500">
                 
                <div class="h-8 w-8 rounded-xl bg-indigo-500/10 text-indigo-400 flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid fa-bell"></i>
                </div>
                
                <div class="flex-1 text-sm font-medium" x-text="toast.message"></div>
                
                <button @click="show = false" class="text-slate-500 hover:text-slate-300 transition p-1">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </template>
    </div>

    <script>
        // Tell HTMX to include CSRF token in all AJAX headers
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
    </script>
</body>
</html>
