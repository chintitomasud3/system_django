<div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
    <!-- Total Tasks Card -->
    <div
        class="bg-slate-900 border border-slate-900 rounded-3xl p-5 relative overflow-hidden group hover:border-slate-800 transitionduration-200">
        <div
            class="absolute -right-4 -bottom-4 text-slate-800/10 text-6xl group-hover:scale-110 transition duration-300">
            <i class="fa-solid fa-list-check"></i>
        </div>
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Tasks</div>
        <div class="mt-2 flex items-baseline gap-2">
            <span class="text-3xl font-outfit font-extrabold text-white">{{ stats.total }}</span>
        </div>
        <div class="mt-2 w-full h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-indigo-500 to-violet-500 rounded-full" style="width: 100%"></div>
        </div>
    </div>

    <!-- To Do Card -->
    <div
        class="bg-slate-900 border border-slate-900 rounded-3xl p-5 relative overflow-hidden group hover:border-slate-800 transition duration-200">
        <div
            class="absolute -right-4 -bottom-4 text-slate-800/10 text-6xl group-hover:scale-110 transition duration-300">
            <i class="fa-solid fa-hourglass-start"></i>
        </div>
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">To Do</div>
        <div class="mt-2 flex items-baseline gap-2">
            <span class="text-3xl font-outfit font-extrabold text-amber-400">{{ stats.todo }}</span>
        </div>
        <div class="mt-2 w-full h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-amber-400 rounded-full"
                style="width: {% if stats.total > 0 %}{% widthratio stats.todo stats.total 100 %}{% else %}0{% endif %}%">
            </div>
        </div>
    </div>

    <!-- In Progress Card -->
    <div
        class="bg-slate-900 border border-slate-900 rounded-3xl p-5 relative overflow-hidden group hover:border-slate-800 transition duration-200">
        <div
            class="absolute -right-4 -bottom-4 text-slate-800/10 text-6xl group-hover:scale-110 transition duration-300">
            <i class="fa-solid fa-spinner"></i>
        </div>
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">In Progress</div>
        <div class="mt-2 flex items-baseline gap-2">
            <span class="text-3xl font-outfit font-extrabold text-blue-400">{{ stats.in_progress }}</span>
        </div>
        <div class="mt-2 w-full h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-blue-400 rounded-full"
                style="width: {% if stats.total > 0 %}{% widthratio stats.in_progress stats.total 100 %}{% else %}0{% endif %}%">
            </div>
        </div>
    </div>

    <!-- Completed Card -->
    <div
        class="bg-slate-900 border border-slate-900 rounded-3xl p-5 relative overflow-hidden group hover:border-slate-800 transition duration-200">
        <div
            class="absolute -right-4 -bottom-4 text-slate-800/10 text-6xl group-hover:scale-110 transition duration-300">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Completed</div>
        <div class="mt-2 flex items-baseline gap-2">
            <span class="text-3xl font-outfit font-extrabold text-emerald-400">{{ stats.completed }}</span>
        </div>
        <div class="mt-2 w-full h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-emerald-400 rounded-full"
                style="width: {% if stats.total > 0 %}{% widthratio stats.completed stats.total 100 %}{% else %}0{% endif %}%">
            </div>
        </div>
    </div>

    <!-- High Priority Card -->
    <div
        class="bg-slate-900 border border-slate-900 rounded-3xl p-5 relative overflow-hidden group hover:border-slate-800 transition duration-200 col-span-2 lg:col-span-1">
        <div
            class="absolute -right-4 -bottom-4 text-slate-800/10 text-6xl group-hover:scale-110 transition duration-300">
            <i class="fa-solid fa-circle-exclamation"></i>
        </div>
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">High Priority</div>
        <div class="mt-2 flex items-baseline gap-2">
            <span class="text-3xl font-outfit font-extrabold text-rose-500">{{ stats.high_priority }}</span>
        </div>
        <div class="mt-2 w-full h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-rose-500 rounded-full"
                style="width: {% if stats.total > 0 %}{% widthratio stats.high_priority stats.total 100 %}{% else %}0{% endif %}%">
            </div>
        </div>
    </div>
</div>
