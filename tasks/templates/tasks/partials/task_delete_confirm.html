<!-- Modal Header -->
<div class="px-6 py-4 border-b border-slate-800/80 bg-slate-950/20 flex items-center justify-between">
    <h3 class="text-lg font-outfit font-bold text-rose-500 flex items-center gap-2">
        <i class="fa-solid fa-triangle-exclamation"></i>
        Delete Task Confirmation
    </h3>
    <button @click="$dispatch('close-modal')" 
            class="text-slate-500 hover:text-slate-300 transition p-1 cursor-pointer">
        <i class="fa-solid fa-xmark text-lg"></i>
    </button>
</div>

<!-- Modal Body -->
<form hx-post="{% url 'tasks:delete' task.pk %}" 
      hx-swap="none" 
      class="m-0">
    {% csrf_token %}
    <div class="p-6 space-y-4">
        <div class="flex items-start gap-3">
            <div class="h-10 w-10 rounded-xl bg-rose-500/10 text-rose-500 flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-trash-can text-lg"></i>
            </div>
            <div>
                <h4 class="font-semibold text-slate-100">Are you sure you want to delete this task?</h4>
                <p class="text-xs text-slate-400 mt-1 leading-relaxed">
                    This action is permanent and cannot be undone. The task <span class="text-slate-200 font-semibold">"{{ task.title }}"</span> will be removed from your dashboard database.
                </p>
            </div>
        </div>
    </div>

    <!-- Modal Footer Actions -->
    <div class="px-6 py-4 border-t border-slate-800/80 bg-slate-950/20 flex items-center justify-end gap-3">
        <!-- Cancel button (loads detail view back) -->
        <button type="button" 
                hx-get="{% url 'tasks:detail' task.pk %}"
                hx-target="#modal-content"
                class="px-4 py-2 text-sm font-semibold text-slate-400 hover:text-slate-200 transition rounded-xl cursor-pointer">
            Cancel
        </button>
        <!-- Confirm Delete button -->
        <button type="submit" 
                class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-rose-600 hover:bg-rose-500 text-white font-semibold text-sm shadow-md hover:shadow-rose-500/20 transition cursor-pointer">
            <i class="fa-solid fa-trash-can text-xs"></i>
            Yes, Delete Task
        </button>
    </div>
</form>
