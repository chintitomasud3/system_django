{% extends 'tasks/base.html' %}

{% block content %}
<!-- Top Row: Welcome & Quick Action -->
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
        <h1 class="text-3xl font-outfit font-extrabold text-slate-100 tracking-tight sm:text-4xl">
            Task Dashboard
        </h1>
        <p class="mt-1.5 text-sm text-slate-400">
            Manage, organize, and execute your team's workflow in real-time.
        </p>
    </div>
    <div>
        <button hx-get="{% url 'tasks:create' %}" 
                hx-target="#modal-content" 
                @click="$dispatch('open-modal')"
                class="inline-flex items-center gap-2 px-5 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm shadow-lg shadow-indigo-600/30 hover:shadow-indigo-500/40 hover:-translate-y-0.5 transition-all duration-200 cursor-pointer">
            <i class="fa-solid fa-plus text-xs"></i>
            Create New Task
        </button>
    </div>
</div>

<!-- Statistics Grid Section (updates dynamically on statsChanged event) -->
<div id="stats-container" 
     hx-get="{% url 'tasks:stats_partial' %}" 
     hx-trigger="stats-changed from:body" 
     hx-swap="outerHTML"
     class="mb-10">
    {% include 'tasks/partials/stats.html' %}
</div>

<!-- Filters, Search & View Toggles Form -->
<div class="bg-slate-900/50 border border-slate-900 rounded-3xl p-5 mb-8">
    <form id="filter-form" 
          hx-get="{% url 'tasks:list_partial' %}" 
          hx-target="#task-list-container" 
          hx-trigger="change, submit"
          class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        
        <!-- Search and Priority Filters -->
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 flex-1">
            <!-- Search bar (dynamic reload on keyup) -->
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" 
                       name="q" 
                       hx-trigger="keyup changed delay:300ms"
                       hx-get="{% url 'tasks:list_partial' %}"
                       hx-target="#task-list-container"
                       hx-include="#filter-form"
                       placeholder="Search tasks by title or description..." 
                       class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-800 rounded-2xl text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200">
            </div>

            <!-- Priority Selector -->
            <div class="relative min-w-[160px]">
                <select name="priority" 
                        class="w-full px-4 py-2.5 bg-slate-950 border border-slate-800 rounded-2xl text-sm text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200 cursor-pointer appearance-none">
                    <option value="">All Priorities</option>
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none text-slate-500">
                    <i class="fa-solid fa-chevron-down text-xs"></i>
                </span>
            </div>
        </div>

        <!-- Hidden input to hold current view state -->
        <input type="hidden" name="view_type" id="view-type-field" value="kanban">

        <!-- View Swapper Buttons (controlled via Alpine) -->
        <div x-data="{ currentView: 'kanban' }" 
             class="flex items-center gap-1.5 p-1 bg-slate-950 border border-slate-800 rounded-2xl">
             
            <!-- Kanban View Button -->
            <button type="button" 
                    @click="currentView = 'kanban'; document.getElementById('view-type-field').value='kanban'; htmx.trigger('#filter-form', 'submit')"
                    :class="currentView === 'kanban' ? 'bg-slate-800 text-indigo-400 font-semibold' : 'text-slate-400 hover:text-slate-200'"
                    class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs transition duration-200">
                <i class="fa-solid fa-table-columns"></i>
                Kanban
            </button>
            
            <!-- List View Button -->
            <button type="button" 
                    @click="currentView = 'list'; document.getElementById('view-type-field').value='list'; htmx.trigger('#filter-form', 'submit')"
                    :class="currentView === 'list' ? 'bg-slate-800 text-indigo-400 font-semibold' : 'text-slate-400 hover:text-slate-200'"
                    class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs transition duration-200">
                <i class="fa-solid fa-list-ul"></i>
                List View
            </button>
        </div>
    </form>
</div>

<!-- Task List/Kanban Container -->
<div id="task-list-container" 
     hx-get="{% url 'tasks:list_partial' %}" 
     hx-trigger="load, task-list-changed from:body" 
     hx-include="#filter-form"
     class="min-h-[400px]">
    <!-- Spinner while loading tasks initially -->
    <div class="flex flex-col items-center justify-center py-20 text-slate-500">
        <i class="fa-solid fa-circle-notch animate-spin text-3xl text-indigo-500 mb-4"></i>
        <p class="text-sm font-medium">Loading workspace board...</p>
    </div>
</div>
{% endblock %}
